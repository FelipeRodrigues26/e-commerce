global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'users-service'
    static_configs:
      - targets: ['users-service:8000']

  - job_name: 'orders-service'
    static_configs:
      - targets: ['orders-service:8000']

  - job_name: 'catalog-service'
    static_configs:
      - targets: ['catalog-service:8000']
