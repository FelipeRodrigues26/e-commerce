version: '3.8'

services:
  db-server:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: defaultdb
    ports:
      - "5435:5432"
    volumes:
      - ./infra/postgres/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d defaultdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  users-service:
    build:
      context: ./backend/users-service
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@db-server:5432/users_db
      - JWT_SECRET=351656f50b44558e805567c293708dfd919a27c00681b95ec3df16e25605d8f2
    depends_on:
      db-server:
        condition: service_healthy
    volumes:
      - ./backend/users-service:/app

  orders-service:
    build:
      context: ./backend/orders-service
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@db-server:5432/orders_db
      - API_GATEWAY_URL=http://api-gateway:8000
      - JWT_SECRET=351656f50b44558e805567c293708dfd919a27c00681b95ec3df16e25605d8f2
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      db-server:
        condition: service_healthy
    volumes:
      - ./backend/orders-service:/app

  shell-ui:
    build:
      context: ./frontend/shell-ui
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/shell-ui:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_USE_POLLING=true
    depends_on:
      - orders-ui
      - catalog-ui

  orders-ui:
    build:
      context: ./frontend/orders-ui
    ports:
      - "3001:3001"
    volumes:
      - ./frontend/orders-ui:/app
      - /app/node_modules

  catalog-ui:
    build:
      context: ./frontend/catalog-ui
    ports:
      - "3003:3003"
    volumes:
      - ./frontend/catalog-ui:/app
      - /app/node_modules

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog-service:
    build:
      context: ./backend/catalog-service
    ports:
      - "8003:8000"
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@db-server:5432/catalog_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db-server:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/catalog-service:/app

  notification-service:
    build:
      context: ./backend/notification-service
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=felipemrodrigues26@gmail.com
      - SMTP_PASSWORD=dkaufiqbnwasbcok
      - API_GATEWAY_URL=http://api-gateway:8000
    depends_on:
      rabbitmq:
        condition: service_healthy
      users-service:
        condition: service_started

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
  api-gateway:
    build:
      context: ./backend/api-gateway
    ports:
      - "8080:8000"
    environment:
      - USERS_SERVICE_URL=http://users-service:8000
      - ORDERS_SERVICE_URL=http://orders-service:8000
      - CATALOG_SERVICE_URL=http://catalog-service:8000
      - GATEWAY_TIMEOUT_SECONDS=${GATEWAY_TIMEOUT_SECONDS:-35}
    depends_on:
      - users-service
      - orders-service
      - catalog-service

volumes:
  postgres_data:
